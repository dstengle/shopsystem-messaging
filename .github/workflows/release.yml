name: release

# On a version-tag (vMAJOR.MINOR.PATCH) push to main, this repository's
# release workflow notifies the shopsystem-bc-launcher build pipeline by
# issuing a repository_dispatch API call targeting that repository. The
# dispatch carries a credential authorized to dispatch to bc-launcher
# (BC_LAUNCHER_DISPATCH_TOKEN), since the default GITHUB_TOKEN is scoped to
# this repository only and cannot dispatch cross-repo.
#
# Pinned by features/release_workflow_repository_dispatch_to_bc_launcher.feature
# (scenario hash a83760dcc40c57e6, work_id lead-4ibl).

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  dispatch-bc-launcher-build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch build to shopsystem-bc-launcher
        env:
          BC_LAUNCHER_DISPATCH_TOKEN: ${{ secrets.BC_LAUNCHER_DISPATCH_TOKEN }}
        run: |
          curl --fail --silent --show-error -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BC_LAUNCHER_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository_owner }}/shopsystem-bc-launcher/dispatches" \
            -d '{"event_type":"framework-utility-release","client_payload":{"source_repo":"${{ github.repository }}","tag":"${{ github.ref_name }}"}}'
